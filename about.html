<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#2193b0,#6dd5ed);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:rgba(255,255,255,.2);

backdrop-filter:blur(10px);

padding:40px;

border-radius:20px;

color:white;

width:500px;

text-align:center;

}

h1{

margin-bottom:25px;

}

p{

font-size:20px;

margin:15px 0;

}

a{

color:#ffe600;

text-decoration:none;

}

button{

margin-top:25px;

padding:12px 30px;

border:none;

border-radius:10px;

background:white;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>Contact Developer</h1>

<p><b>Name:</b> Krishna M G</p>

<p><b>Course:</b> B.Tech Computer Science</p>

<p><b>Project:</b> Student Performance Predictor</p>

<p><b>Email:</b> your-email@example.com</p>

<p><b>LinkedIn:</b> Add your LinkedIn profile</p>

<p><b>GitHub:</b> Add your GitHub profile</p>

<button onclick="location.href='index.html'">
⬅ Back to Home
</button>



</div>

</body>
</html>
